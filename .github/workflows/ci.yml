name: CI

on:
  push:
    branches: [master, sandbox]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_citations.py \
            --ignore=tests/test_web_atoms.py \
            --ignore=tests/test_daemon.py \
            -q --tb=short
        env:
          LLM_MODEL: test-model
