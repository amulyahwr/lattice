<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lattice</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/vendor/marked.min.js"></script>
<!-- apply saved theme before paint to prevent flash -->
<script>
  (function() {
    var t = localStorage.getItem('lattice-theme');
    if (t) document.documentElement.dataset.theme = t;
  })();
</script>
</head>
<body>

<header>
  <div class="header-left">
    <!-- 3D rotating cube logo -->
    <div class="logo-scene">
      <div class="logo-entry">
        <div class="logo-cube">
          <div class="lc-face lc-front"><span></span><span></span><span></span><span></span></div>
          <div class="lc-face lc-right"><span></span><span></span><span></span><span></span></div>
          <div class="lc-face lc-left"><span></span><span></span><span></span><span></span></div>
          <div class="lc-face lc-top"><span></span><span></span><span></span><span></span></div>
          <div class="lc-face lc-back"></div>
          <div class="lc-face lc-bottom"></div>
        </div>
      </div>
    </div>
    <h1>Lattice</h1>
  </div>

  <div class="header-right">
    <div class="daemon-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-label">Connecting…</span>
    </div>
    <div class="streak-badge" id="streak-badge" title="Consecutive days with at least one query"></div>
    <button class="save-session-btn" id="save-session" title="Save this session to memory" disabled>Save session</button>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
  </div>
</header>

<div class="layout">

  <div class="chat-panel">
    <div class="chat-history" id="chat-history">
      <div class="empty-state">
        <div class="empty-icon">
          <div class="ei-cube">
            <div class="lc-face ei-front"><span></span><span></span><span></span><span></span></div>
            <div class="lc-face ei-right"><span></span><span></span><span></span><span></span></div>
            <div class="lc-face ei-top"><span></span><span></span><span></span><span></span></div>
            <div class="lc-face ei-left"><span></span><span></span><span></span><span></span></div>
            <div class="lc-face ei-back"></div>
            <div class="lc-face ei-bottom"></div>
          </div>
        </div>
        <p class="greeting" id="greeting"></p>
      </div>
    </div>

    <button class="scroll-btn" id="scroll-btn">↓ Latest</button>
    <div class="input-bar">
      <div class="upload-progress" id="upload-progress"></div>
      <form id="query-form" style="display:contents">
        <input id="question" type="text" placeholder="Ask anything…" autocomplete="off" />
        <button id="submit" type="submit">Ask</button>
      </form>
      <label class="upload-btn" title="Upload any file — PDF, Word, PowerPoint, Excel, code, text">
        <input type="file" id="file-upload" style="display:none" multiple>
        <svg class="upload-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2v8M5 5l3-3 3 3M3 11v2h10v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg class="upload-spinner" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" stroke-dasharray="28" stroke-dashoffset="10" stroke-linecap="round"/></svg>
      </label>
    </div>
    <div class="input-hint">↵ Enter &nbsp;·&nbsp; Esc to clear</div>
  </div>

  <div class="atoms-panel">
    <div class="atoms-panel-header">Recent memories <span id="memory-count"></span></div>
    <div class="atoms-list" id="atoms-list">
      <div class="atoms-empty">Loading…</div>
    </div>
  </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
